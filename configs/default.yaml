# Experiment configuration
project_name: wavelet_snn_deepfake

# Data
data:
  sample_rate: 16000
  max_duration_sec: 4.0        # truncate/pad to this
  max_samples: 64000           # sr * max_duration
  asvspoof_root: data/raw/asvspoof2019
  wavefake_root: data/raw/wavefake
  inthewild_root: data/raw/in_the_wild
  processed_root: data/processed
  musan_root: data/raw/musan          # MUSAN corpus (noise/speech/music)
  rir_root: data/raw/RIRS_NOISES      # Room Impulse Responses (simulated)

# Feature extraction
features:
  mel:
    n_mels: 80
    n_fft: 1024
    hop_length: 256
    f_min: 20
    f_max: 8000
  wavelet:
    J: 8                       # scattering depth
    Q: 12                      # quality factor (filters per octave)
    shape: 64000               # input length
  wavelet_v2:
    J: 8
    Q: 8                       # 8 filters/octave (standard for speech)
    shape: 64000
  wavelet_v3:                    # WST-X inspired (arXiv 2602.02980)
    J: 5                         # smaller J preserves transient artifacts
    Q: 10                        # finer freq resolution for subtle spectral cues
    max_order: 2                 # order-2 captures amplitude modulation dynamics
    shape: 64000
  wavelet_v3_order1:             # Ablation: same as v3 but order-1 only
    J: 5
    Q: 10
    max_order: 1                 # no second-order coefficients
    shape: 64000

# Models
model:
  resnet:
    num_classes: 2
    pretrained: false
  snn:
    num_steps: 50              # simulation timesteps
    beta: 0.95                 # membrane decay
    threshold: 1.0
    num_classes: 2
  snn_v2:
    num_steps: 50
    beta_init: 0.8             # diverse init range [0.7, 0.9]
    threshold_init: 0.3        # lowered from 1.0 — LayerNorm gives N(0,1) currents
    num_classes: 2
    firing_rate_target: 0.2    # target spikes/timestep
    firing_rate_lambda: 0.05   # raised from 0.01 for stronger regularization
    temporal_mode: conv        # "conv" for mel (default), "aligned" for wavelet_v3
  snn_v3:
    hidden_dim: 128            # SSM working dimension
    num_steps: 50
    beta_init: 0.8
    threshold_init: 0.3
    num_classes: 2
    firing_rate_target: 0.2
    firing_rate_lambda: 0.05
    ssm_layers: 2              # stacked SSM layers
    ssm_d_state: 32            # state dim per SSM channel
  snn_v4:                      # same arch as v3, paired with wavelet_v2 frontend
    hidden_dim: 128
    num_steps: 50
    beta_init: 0.8
    threshold_init: 0.3
    num_classes: 2
    firing_rate_target: 0.2
    firing_rate_lambda: 0.05
    ssm_layers: 2
    ssm_d_state: 32
  snn_v5:                      # v5: more capacity + cross-freq mixing + wavelet-matched init
    hidden_dim: 192            # 1.5x v4 — balances capacity vs overfitting (45 samples/param)
    num_steps: 50
    beta_init: 0.8
    threshold_init: 0.3
    num_classes: 2
    firing_rate_target: 0.2
    firing_rate_lambda: 0.05
    ssm_layers: 3              # 3 layers (up from 2) for deeper temporal modeling
    ssm_d_state: 64            # 2x v4 — richer per-channel dynamics
    cross_freq_heads: 4        # unused (kept for compat), GLU mixing used instead
    cross_freq_dim: 64         # unused (kept for compat)
    cross_freq_expand: 1       # GLU expand factor (1 = no expansion, saves params)
    wavelet_matched_init: true # init SSM frequencies to match wavelet band structure
    channel_norm: true         # apply per-channel normalization from precomputed stats

# Training
training:
  batch_size: 256
  epochs: 30
  lr: 4.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  warmup_epochs: 0             # linear warmup before cosine decay (0 = no warmup)
  early_stopping_patience: 5
  seed: 42
  # Per-model training overrides (merged on top of defaults above)
  overrides:
    snn:
      lr: 1.0e-4              # match snn_v2 findings
      epochs: 50
      warmup_epochs: 2
      early_stopping_patience: 15
    snn_v2:
      lr: 1.0e-4              # warmup sweep showed best EER at 1e-4, degrades above
      epochs: 50
      warmup_epochs: 2         # short warmup from 5e-5 → 1e-4
      early_stopping_patience: 15
    snn_v5:
      lr: 1.0e-4              # SNN v2 sweep showed 1e-4 is the sweet spot
      epochs: 80
      warmup_epochs: 3         # short warmup to stabilize SSM + LIF
      early_stopping_patience: 20  # very patient — regularization slows convergence
      weight_decay: 1.0e-4    # stronger — fight domain overfitting
      label_smoothing: 0.1     # soft targets prevent overconfident memorization
      spec_augment: true       # mask time/freq bands to force general features

# Evaluation
eval:
  metrics: [eer, accuracy, f1, auc]
  datasets: [asvspoof_eval, wavefake, in_the_wild]
